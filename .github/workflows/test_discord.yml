name: Test Discord Webhooks

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main
    paths:
      - 'test_discord.py'
      - '.github/workflows/test_discord.yml'

jobs:
  test-webhooks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Test Discord Webhooks
      env:
        DISCORD_WEBHOOK_MEGA: ${{ secrets.DISCORD_WEBHOOK_MEGA }}
        DISCORD_WEBHOOK_MAJOR: ${{ secrets.DISCORD_WEBHOOK_MAJOR }}
        DISCORD_WEBHOOK_STANDARD: ${{ secrets.DISCORD_WEBHOOK_STANDARD }}
      run: |
        python test_discord.py
    
    - name: Test Results
      if: success()
      run: echo "✅ All Discord webhooks are working!"
    
    - name: Test Failed
      if: failure()
      run: |
        echo "❌ Some webhooks failed - check logs above"
        exit 1
