name: SEC M&A Scanner v2.0 - Item 1.01

on:
  schedule:
    # Godziny rynkowe (9:00-20:00 EST = 14:00-01:00 UTC) - co 15 minut
    - cron: '*/15 14-23 * * 1-5'
    - cron: '0 0-1 * * 2-6'

    # Po godzinach - co godzinę
    - cron: '0 2-13 * * 1-5'

    # Weekendy - co 4 godziny
    - cron: '0 */4 * * 0,6'

  workflow_dispatch:

concurrency:
  group: scanner-v2
  cancel-in-progress: true

jobs:
  scan_v2:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_v2.txt

    - name: Run M&A Scanner v2
      env:
        DISCORD_WEBHOOK_V2: ${{ secrets.DISCORD_WEBHOOK_V2 }}
        GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        GIST_TOKEN:         ${{ secrets.GIST_TOKEN }}
        GIST_ID_MA:         ${{ secrets.GIST_ID_MA }}
      run: |
        python ma_scanner_v2.py
